name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Lint with black
        run: black --check notebooks/ tests/ || true
      
      - name: Lint with flake8
        run: flake8 notebooks/ tests/ --max-line-length=100 --ignore=E203,W503 || true
      
      - name: Run tests
        run: pytest tests/ -v
